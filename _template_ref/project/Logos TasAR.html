<style>

    /* TasAR palette — derived from Mandao's bones but tuned for real-estate trust */
    --ink:        #0D1412;     /* deep near-black (Mandao fg-1) */

</style>

<div id="root"></div>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

/* ---------- shared artboard chrome ---------- */
const board = (bg = 'var(--paper)') => ({

  display: 'flex', alignItems: 'center', justifyContent: 'center',

const caption = {

  fontSize: 11, fontWeight: 600,
  letterSpacing: '0.14em', textTransform: 'uppercase',
  color: 'rgba(13,20,18,0.45)',

const stage = { display:'flex', flexDirection:'column', alignItems:'center', gap: 18 };

/* ============================================================
   1. Bold wordmark — "tas·AR" with AR emphasis
   ============================================================ */
function Logo1(){

/* ============================================================
   12. Heatmap grid — value/zone mark
   ============================================================ */
function Logo12(){
  // 6x6 grid with a heatmap gradient, suggesting market zones / valuation density
  const cols = 8, rows = 5;
  // pre-computed intensity per cell (hand-tuned to feel like a heatmap)
  const intensities = [
    [0.1,0.15,0.2,0.35,0.55,0.4,0.2,0.1],
    [0.15,0.25,0.45,0.7,0.85,0.6,0.35,0.15],
    [0.2,0.4,0.7,1.0,1.0,0.8,0.45,0.2],
    [0.15,0.3,0.55,0.8,0.9,0.6,0.3,0.15],
    [0.1,0.18,0.3,0.45,0.55,0.35,0.18,0.1],
  ];
  const colorFor = (v) => {
    if (v < 0.2)  return 'rgba(0,179,126,0.12)';
    if (v < 0.4)  return 'rgba(0,179,126,0.32)';
    if (v < 0.6)  return 'rgba(0,179,126,0.55)';
    if (v < 0.85) return '#00B37E';
    return '#008F63';
  };
  const cell = 22, gap = 4;
  const w = cols * cell + (cols-1)*gap;
  const h = rows * cell + (rows-1)*gap;
  return (
    <div style={board('var(--paper)')}>
      <div style={stage}>
        <div style={{
          display:'grid',
          gridTemplateColumns:`repeat(${cols}, ${cell}px)`,
          gap,
          width: w, height: h,
        }}>
          {intensities.flat().map((v, i) => (
            <div key={i} style={{
              width:cell, height:cell, borderRadius:4,
              background: colorFor(v),
            }}/>
          ))}
        </div>
        <div style={{
          fontFamily:"'Sora',sans-serif", fontWeight:700,
          fontSize:72, letterSpacing:'-0.045em', lineHeight:1,
          color:'var(--ink)',
        }}>
          TasAR
        </div>
        <div style={{
          fontFamily:"'Inter',sans-serif", fontWeight:500,
          fontSize:11, letterSpacing:'0.28em', textTransform:'uppercase',
          color:'var(--ink-2)',
        }}>
          Mapa de valor · por zona
        </div>
      </div>
      <div style={caption}>12 — Heatmap · valor por zona</div>
    </div>
  );
}

            }}>tA</div>
          </div>
        ))}
      </div>
      <div style={caption}>App icon · 128 / 64 / 32</div>
    </div>
  );
}
