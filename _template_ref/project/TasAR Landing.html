<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>TasAR — Inteligencia del mercado inmobiliario</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root{
    --ink:        #0D1412;
    --ink-2:      #2A332F;
    --ink-3:      #5A6562;
    --paper:      #FAFBFA;
    --paper-2:    #F2F4F2;
    --paper-3:    #E9ECEA;
    --line:       rgba(13,20,18,0.08);
    --line-2:     rgba(13,20,18,0.14);
    --accent:     #00B37E;
    --accent-dk:  #008F63;
    --warn:       #C9532A;
    --gain:       #00B37E;
    --loss:       #C9532A;
  }
  html[data-theme="dark"]{
    --ink:        #FAFBFA;
    --ink-2:      #C8CFCC;
    --ink-3:      #7B8582;
    --paper:      #0B100F;
    --paper-2:    #131816;
    --paper-3:    #1B221F;
    --line:       rgba(250,251,250,0.08);
    --line-2:     rgba(250,251,250,0.14);
  }

  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  *{box-sizing:border-box;}

  /* ----- typography ----- */
  .display { font-family:'Sora',sans-serif; font-weight:700; letter-spacing:-0.045em; line-height:0.95; }
  .display-tight { font-family:'Sora',sans-serif; font-weight:800; letter-spacing:-0.05em; line-height:0.9; }
  .eyebrow {
    font-family:'Inter',sans-serif; font-weight:600;
    font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
    color: var(--ink-3);
  }
  .mono { font-family:'JetBrains Mono',ui-monospace,monospace; }
  .num  { font-family:'Sora',sans-serif; font-weight:700; font-feature-settings:"tnum"; letter-spacing:-0.035em; }

  /* ----- layout ----- */
  .page { max-width: 1440px; margin: 0 auto; }
  .gutter { padding-inline: 56px; }
  .row { display:flex; }
  .hairline { height:1px; background: var(--line); }

  /* ----- ticker ----- */
  .ticker {
    border-bottom:1px solid var(--line);
    overflow:hidden; height: 38px;
    display:flex; align-items:center; background: var(--paper);
    position: sticky; top: 0; z-index: 90;
  }
  .ticker-tag {
    background: var(--ink); color: var(--paper);
    font-family:'Inter',sans-serif; font-weight:700; font-size:10.5px;
    letter-spacing:0.18em; padding: 8px 14px;
    flex-shrink: 0; white-space: nowrap;
    text-transform:uppercase;
  }
  .ticker-track {
    display:flex; gap: 40px; align-items:center;
    animation: ticker-scroll 60s linear infinite;
    white-space: nowrap; padding-inline: 24px;
  }
  @keyframes ticker-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .ticker-item { display:flex; align-items:center; gap:8px; font-size:12px; }
  .ticker-item .zone { font-weight:600; color: var(--ink); }
  .ticker-item .px { font-family:'JetBrains Mono',ui-monospace,monospace; color: var(--ink-2); }
  .ticker-item .chg { font-family:'JetBrains Mono',ui-monospace,monospace; font-weight:600; font-size:11px; }
  .up   { color: var(--gain); }
  .down { color: var(--loss); }

  /* ----- nav ----- */
  nav.top {
    height: 84px; display:flex; align-items:center; justify-content:space-between;
    position: sticky; top: 38px; z-index: 80; background: var(--paper);
    border-bottom: 1px solid var(--line);
  }
  nav.top .links { display:flex; gap: 32px; align-items:center; }
  nav.top a { text-decoration:none; color: var(--ink-2); font-size:14px; font-weight:500; }
  nav.top a:hover { color: var(--ink); }
  .pill {
    height: 40px; padding-inline: 18px; border-radius: 10px;
    display:inline-flex; align-items:center; gap:8px;
    background: var(--ink); color: var(--paper);
    font-weight:600; font-size: 14px;
    border: none; cursor:pointer;
    transition: transform .15s ease;
  }
  .pill:hover { transform: translateY(-1px); }
  .pill.accent { background: var(--accent); color: var(--ink); }
  .pill.ghost  { background: transparent; color: var(--ink); border:1px solid var(--line-2); }

  /* ----- hero ----- */
  .hero { padding-block: 80px 64px; display:grid; grid-template-columns: 1.05fr 0.95fr; gap: 64px; align-items:end; }
  .hero h1 { font-size: 96px; margin: 18px 0 28px; }
  .hero h1 .accent { color: var(--accent); }
  .hero p.lede { font-size: 19px; line-height: 1.5; color: var(--ink-2); max-width: 560px; margin-bottom: 36px; }
  .hero-ctas { display:flex; gap:12px; align-items:center; }
  .hero-meta {
    margin-top: 56px; display:grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    border-top: 1px solid var(--line);
    padding-top: 28px;
  }
  .hero-meta .cell { padding-right: 24px; }
  .hero-meta .label { color: var(--ink-3); font-size: 11px; letter-spacing:0.18em; text-transform:uppercase; font-weight:600; margin-bottom: 8px; }
  .hero-meta .val { font-size: 32px; }

  /* ----- hero heatmap card ----- */
  .heatcard {
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 24px;
    display:flex; flex-direction:column; gap: 18px;
    position: relative; overflow: hidden;
  }
  .heatcard .head { display:flex; justify-content:space-between; align-items:baseline; }
  .heatcard .head .title { font-size: 13px; font-weight: 600; color: var(--ink); }
  .heatcard .head .sub   { font-size: 11px; color: var(--ink-3); }
  .legend { display:flex; align-items:center; gap: 10px; font-size: 10.5px; color: var(--ink-3); font-family:'JetBrains Mono',ui-monospace,monospace; }
  .legend .scale { display:flex; gap:2px; }
  .legend .scale span { width: 22px; height: 8px; border-radius: 2px; }

  /* ----- metrics row ----- */
  .metrics { display:grid; grid-template-columns: repeat(4, 1fr); border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .metrics .m { padding: 32px 28px; border-right:1px solid var(--line); display:flex; flex-direction:column; gap:10px; }
  .metrics .m:last-child{ border-right:none; }
  .metrics .m .k { color: var(--ink-3); font-size:11px; letter-spacing:0.2em; text-transform:uppercase; font-weight:600; }
  .metrics .m .v { font-size: 42px; line-height:1; }
  .metrics .m .d { font-size: 12px; color: var(--ink-2); }

  /* ----- section header ----- */
  .section { padding-block: 96px; }
  .section-head { display:flex; justify-content:space-between; align-items:flex-end; gap:32px; margin-bottom: 56px; }
  .section-head h2 { font-size: 56px; margin:0; max-width: 720px; }
  .section-head .right { max-width: 320px; color: var(--ink-2); font-size: 15px; line-height:1.5; }

  /* ----- products grid ----- */
  .products { display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .prod {
    background: var(--paper-2); border: 1px solid var(--line); border-radius: 16px;
    padding: 28px; display:flex; flex-direction:column; gap: 16px;
    min-height: 360px; position:relative; overflow:hidden;
    transition: transform .2s ease;
  }
  .prod:hover { transform: translateY(-2px); }
  .prod .tag { font-size:10.5px; letter-spacing:0.18em; text-transform:uppercase; color: var(--ink-3); font-weight:600; }
  .prod h3 { font-family:'Sora',sans-serif; font-weight:700; font-size: 32px; letter-spacing:-0.035em; margin: 4px 0 0; }
  .prod p { color: var(--ink-2); font-size: 14.5px; line-height:1.55; margin: 0; }
  .prod .foot { margin-top: auto; display:flex; justify-content:space-between; align-items:center; }
  .prod .price { font-family:'Sora',sans-serif; font-weight:700; font-size: 22px; letter-spacing:-0.02em; }
  .prod .price small { font-weight:500; font-size:12px; color: var(--ink-3); margin-left:6px; }
  .arrow { display:inline-flex; width:34px; height:34px; border-radius:999px; background: var(--ink); color: var(--paper); align-items:center; justify-content:center; }

  /* ----- report preview ----- */
  .report {
    display:grid; grid-template-columns: 0.9fr 1.1fr; gap: 48px; align-items:stretch;
    background: var(--paper-2); border:1px solid var(--line); border-radius: 20px; padding: 40px;
  }
  .report .meta { font-size: 11px; letter-spacing:0.22em; text-transform:uppercase; color: var(--ink-3); font-weight:600; }
  .report h3 { font-size: 44px; margin: 18px 0 18px; }
  .report ul { list-style:none; padding:0; margin: 24px 0 0; display:flex; flex-direction:column; gap: 10px; }
  .report ul li { display:flex; gap:12px; font-size:14.5px; color: var(--ink-2); }
  .report ul li::before { content:""; width:6px; height:6px; border-radius:99px; background: var(--accent); margin-top:9px; flex:0 0 auto; }
  .chart-card { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 24px; display:flex; flex-direction:column; gap: 16px; }

  /* ----- tasador interactive ----- */
  .tasador {
    display:grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items:start;
  }
  .tasador-form, .tasador-result {
    background: var(--paper-2); border:1px solid var(--line); border-radius: 16px;
    padding: 28px; display:flex; flex-direction:column; gap: 18px;
  }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color: var(--ink-3); font-weight:600; }
  .field .ctl {
    height: 46px; border:1px solid var(--line-2); background: var(--paper); border-radius: 10px;
    display:flex; align-items:center; padding-inline: 14px; font-size:14px; color: var(--ink);
  }
  .field-row { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .chips { display:flex; gap: 8px; flex-wrap:wrap; }
  .chip { padding: 8px 12px; border-radius: 999px; border:1px solid var(--line-2); font-size: 13px; font-weight:500; color: var(--ink-2); cursor: pointer; }
  .chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .tasador-result .value { font-size: 56px; line-height:1; }
  .tasador-result .range { font-family:'JetBrains Mono',ui-monospace,monospace; color: var(--ink-2); font-size: 13px; }
  .conf {
    height: 6px; width:100%; background: var(--paper-3); border-radius: 99px; overflow: hidden;
  }
  .conf .bar { height: 100%; background: var(--accent); border-radius: 99px; }

  /* ----- how it works ----- */
  .how {
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  }
  .step { padding: 32px 28px; border:1px solid var(--line); border-radius: 16px; background: var(--paper); display:flex; flex-direction:column; gap: 14px; min-height: 220px; }
  .step .n { font-family:'Sora',sans-serif; font-weight:700; font-size: 56px; color: var(--accent); letter-spacing: -0.04em; line-height:1; }
  .step h4 { font-family:'Sora',sans-serif; font-weight:700; font-size: 22px; margin:0; letter-spacing:-0.025em; }
  .step p { margin:0; color: var(--ink-2); font-size: 14.5px; line-height:1.55; }

  /* ----- clients band ----- */
  .clients { padding-block: 64px; border-top:1px solid var(--line); border-bottom: 1px solid var(--line); }
  .clients-grid { display:grid; grid-template-columns: repeat(6, 1fr); gap: 24px; align-items:center; }
  .client-logo {
    height: 32px; display:flex; align-items:center; justify-content:center;
    color: var(--ink-3); font-family:'Sora',sans-serif; font-weight:600; font-size: 14px;
    letter-spacing:0.05em;
    opacity: 0.75;
  }

  /* ----- testimonial ----- */
  .quote {
    font-family:'Sora', sans-serif; font-weight:500;
    font-size: 44px; letter-spacing: -0.025em; line-height: 1.12;
    color: var(--ink); max-width: 1080px;
  }
  .quote .accent { color: var(--accent); }
  .attrib { margin-top: 32px; display:flex; align-items:center; gap: 14px; }
  .avatar { width: 44px; height: 44px; border-radius:99px; background: linear-gradient(135deg, var(--accent), var(--accent-dk)); }
  .attrib .who { font-weight:600; font-size:14px; }
  .attrib .who small { display:block; color: var(--ink-3); font-weight:500; }

  /* ----- final CTA ----- */
  .cta-final {
    background: var(--ink); color: var(--paper);
    border-radius: 24px; padding: 80px;
    display:grid; grid-template-columns: 1.2fr 0.8fr; gap: 48px; align-items:end;
    position: relative; overflow: hidden;
  }
  .cta-final h2 { font-size: 80px; margin:0; color: var(--paper); }
  .cta-final p { color: rgba(250,251,250,0.65); font-size: 17px; max-width: 460px; }

  /* ----- footer ----- */
  footer { padding-block: 64px 40px; border-top:1px solid var(--line); }
  .foot-cols { display:grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 32px; margin-bottom: 56px; }
  .foot-cols h5 { font-family:'Inter'; font-weight:600; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color: var(--ink-3); margin: 0 0 16px; }
  .foot-cols ul { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap: 10px; }
  .foot-cols a { color: var(--ink-2); text-decoration:none; font-size: 14px; }
  .foot-cols a:hover { color: var(--ink); }
  .foot-bottom { display:flex; justify-content:space-between; align-items:center; color: var(--ink-3); font-size: 12px; padding-top: 24px; border-top:1px solid var(--line); }

  /* ----- spinning anim for "live" dot ----- */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }
  .live-dot { width: 7px; height: 7px; border-radius:99px; background: var(--accent); animation: blink 1.6s ease-in-out infinite; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="landing-app.jsx"></script>
</head>
<body>
<div id="root"></div>
</body>
</html>
