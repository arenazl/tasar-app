<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>TasAR — CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root{
    --ink:        #0D1412;
    --ink-2:      #2A332F;
    --ink-3:      #5A6562;
    --ink-4:      #8B928F;
    --paper:      #FAFBFA;
    --paper-2:    #F4F6F4;
    --paper-3:    #ECEFEC;
    --line:       rgba(13,20,18,0.07);
    --line-2:     rgba(13,20,18,0.13);
    --accent:     #00B37E;
    --accent-dk:  #008F63;
    --accent-soft:rgba(0,179,126,0.12);
    --gain:       #00B37E;
    --loss:       #C9532A;
    --warn:       #D9A93A;
    --info:       #3B82F6;
  }
  html[data-theme="dark"]{
    --ink:        #FAFBFA;
    --ink-2:      #C8CFCC;
    --ink-3:      #828A87;
    --ink-4:      #5A6562;
    --paper:      #0B100F;
    --paper-2:    #131816;
    --paper-3:    #1B221F;
    --line:       rgba(250,251,250,0.07);
    --line-2:     rgba(250,251,250,0.13);
    --accent-soft:rgba(0,179,126,0.16);
  }

  html, body { margin:0; padding:0; height:100%; background: var(--paper); color: var(--ink); font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  *{ box-sizing:border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 99px; border: 2px solid var(--paper); }
  ::-webkit-scrollbar-track { background: transparent; }

  .mono { font-family:'JetBrains Mono',ui-monospace,monospace; font-feature-settings:"tnum"; }
  .num  { font-family:'Sora',sans-serif; font-weight:700; letter-spacing:-0.025em; font-feature-settings:"tnum"; }
  .eyebrow { font-family:'Inter',sans-serif; font-weight:600; font-size:10.5px; letter-spacing:0.18em; text-transform:uppercase; color: var(--ink-3); }
  button { font-family: inherit; cursor: pointer; }

  /* ===== Shell ===== */
  .app {
    display: grid;
    grid-template-columns: 224px 1fr;
    height: 100vh;
    background: var(--paper-2);
  }

  /* ----- Sidebar ----- */
  aside.sidebar {
    background: var(--paper);
    border-right: 1px solid var(--line);
    display:flex; flex-direction:column;
    padding: 18px 14px 14px;
    gap: 8px;
  }
  .logo-row { display:flex; align-items:center; gap:10px; padding: 6px 8px 18px; }
  .logo-row .wm { font-family:'Sora',sans-serif; font-weight:700; font-size: 20px; letter-spacing:-0.035em; }
  .org-pill {
    display:flex; align-items:center; gap: 10px;
    padding: 10px 10px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--paper-2); cursor:pointer;
    transition: background .15s ease;
    min-width: 0;
  }
  .org-pill:hover { background: var(--paper-3); }
  .org-pill .av { width: 30px; height: 30px; border-radius: 8px; background: var(--ink); color: var(--paper); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; letter-spacing:0.04em; flex: 0 0 auto; }
  .org-pill .col { display:flex; flex-direction:column; min-width: 0; flex: 1 1 auto; }
  .org-pill .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .org-pill .plan { font-size: 10.5px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .org-pill .caret { margin-left:auto; color: var(--ink-3); flex: 0 0 auto; }

  .nav-section { display:flex; flex-direction:column; gap: 2px; margin-top: 4px; }
  .nav-section h6 { margin: 18px 8px 8px; font-size: 10.5px; letter-spacing: 0.16em; text-transform:uppercase; color: var(--ink-4); font-weight:600; }
  .nav-item {
    display:flex; align-items:center; gap:10px;
    padding: 8px 10px; border-radius: 8px;
    color: var(--ink-2); text-decoration:none; font-size: 13.5px; font-weight: 500;
    cursor:pointer;
    transition: background .15s ease;
  }
  .nav-item:hover { background: var(--paper-2); }
  .nav-item.active { background: var(--ink); color: var(--paper); }
  .nav-item.active .badge { background: var(--paper); color: var(--ink); }
  .nav-item .icon { width: 18px; height: 18px; flex:0 0 auto; display:inline-flex; }
  .nav-item .badge {
    margin-left:auto; font-size: 10.5px; font-weight: 600;
    background: var(--paper-3); color: var(--ink-2);
    padding: 2px 7px; border-radius: 99px; font-family:'JetBrains Mono',ui-monospace,monospace;
  }
  .nav-item .badge.accent { background: var(--accent); color: var(--ink); }

  .sidebar-foot { margin-top: auto; display:flex; flex-direction:column; gap:8px; padding-top: 16px; border-top:1px solid var(--line); }
  .user-row { display:flex; align-items:center; gap:10px; padding: 6px 8px; }
  .user-row .av { width:30px; height:30px; border-radius:99px; background: linear-gradient(135deg, var(--accent), var(--accent-dk)); }
  .user-row .name { font-size: 13px; font-weight:600; }
  .user-row .role { font-size: 11px; color: var(--ink-3); }

  /* ----- Main column ----- */
  main.col { display:grid; grid-template-rows: 56px minmax(0, 1fr); min-width:0; min-height: 0; overflow: hidden; }

  /* topbar */
  .topbar {
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
    padding: 0 22px;
    gap: 18px;
  }
  .crumbs { display:flex; align-items:center; gap:8px; font-size: 13px; color: var(--ink-3); }
  .crumbs strong { color: var(--ink); font-weight:600; }
  .crumbs .sep { color: var(--ink-4); }
  .search {
    flex: 0 0 360px;
    display:flex; align-items:center; gap:8px;
    height: 36px; padding: 0 12px;
    background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink-3); font-size: 13px;
  }
  .search .kbd { margin-left:auto; font-family:'JetBrains Mono',ui-monospace,monospace; font-size:10.5px; color: var(--ink-3); border:1px solid var(--line-2); padding: 1px 6px; border-radius:4px; }
  .topbar-actions { display:flex; align-items:center; gap: 8px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--paper); color: var(--ink-2);
    display:flex; align-items:center; justify-content:center; cursor: pointer;
    position: relative;
  }
  .icon-btn .dot { position:absolute; top: 7px; right: 7px; width: 7px; height: 7px; border-radius:99px; background: var(--accent); border: 2px solid var(--paper); }
  .pill-btn {
    display:inline-flex; align-items:center; gap:8px;
    height: 36px; padding: 0 14px;
    background: var(--ink); color: var(--paper);
    border: none; border-radius: 8px;
    font-weight: 600; font-size: 13px;
  }
  .pill-btn.accent { background: var(--accent); color: var(--ink); }
  .pill-btn.ghost  { background: var(--paper); color: var(--ink); border: 1px solid var(--line); }

  /* workspace = list + detail + right rail */
  .workspace {
    display:grid;
    grid-template-columns: 360px 1fr 280px;
    background: var(--paper);
    min-height: 0;
    overflow: hidden;
  }

  /* ----- List pane ----- */
  .list-pane { border-right: 1px solid var(--line); display:flex; flex-direction:column; min-height: 0; background: var(--paper); }
  .list-head { padding: 16px 18px 0; }
  .list-title { display:flex; align-items:center; justify-content:space-between; }
  .list-title h2 { font-family:'Sora',sans-serif; font-weight:700; font-size: 22px; letter-spacing:-0.025em; margin: 0; }
  .list-title .count { font-size: 12px; color: var(--ink-3); font-family:'JetBrains Mono',ui-monospace,monospace; }
  .tabs { display:flex; gap: 4px; margin-top: 14px; border-bottom: 1px solid var(--line); }
  .tab { padding: 10px 12px; font-size: 13px; color: var(--ink-3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; display:flex; align-items:center; gap:8px; white-space: nowrap; }
  .tab.on { color: var(--ink); border-bottom-color: var(--ink); font-weight:600; }
  .tab .cnt { font-family:'JetBrains Mono',ui-monospace,monospace; font-size:10.5px; color: var(--ink-3); background: var(--paper-2); padding: 1px 6px; border-radius: 99px; }
  .tab.on .cnt { background: var(--ink); color: var(--paper); }

  .filter-row { display:flex; gap: 6px; padding: 12px 18px; flex-wrap:wrap; border-bottom: 1px solid var(--line); }
  .chip {
    padding: 5px 10px; border-radius: 99px; border: 1px solid var(--line-2);
    font-size: 12px; color: var(--ink-2); display:inline-flex; align-items:center; gap:6px;
    background: var(--paper);
  }
  .chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .chip .x { color: var(--ink-3); }

  .items { flex:1; overflow-y:auto; }
  .item {
    padding: 14px 18px; border-bottom: 1px solid var(--line);
    display:flex; flex-direction:column; gap: 6px; cursor: pointer;
    position: relative;
  }
  .item:hover { background: var(--paper-2); }
  .item.selected { background: var(--paper-2); }
  .item.selected::before {
    content:""; position:absolute; left:0; top:0; bottom:0; width: 3px; background: var(--accent);
  }
  .item-row1 { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .item-addr { font-size: 14px; font-weight:600; color: var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .item-id   { font-family:'JetBrains Mono',ui-monospace,monospace; font-size: 10.5px; color: var(--ink-3); }
  .item-meta { display:flex; align-items:center; gap: 12px; font-size: 12px; color: var(--ink-3); }
  .item-meta .price { font-family:'Sora',sans-serif; font-weight:700; font-size: 14px; color: var(--ink); letter-spacing:-0.02em; }
  .status {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 4px;
    display:inline-flex; align-items:center; gap: 5px;
    white-space: nowrap;
  }
  .status .d { width:6px; height:6px; border-radius:99px; }
  .status.en-analisis  { background: rgba(217,169,58,0.14); color: #94701F; }
  .status.en-analisis .d  { background: var(--warn); }
  .status.solicitado   { background: rgba(59,130,246,0.12); color: #2A66C7; }
  .status.solicitado .d   { background: var(--info); }
  .status.entregado    { background: var(--accent-soft); color: var(--accent-dk); }
  .status.entregado .d    { background: var(--accent); }
  .status.revision     { background: rgba(201,83,42,0.12); color: #A33F1E; }
  .status.revision .d     { background: var(--loss); }

  html[data-theme="dark"] .status.en-analisis { color: #E1B95A; }
  html[data-theme="dark"] .status.solicitado  { color: #82A9F0; }
  html[data-theme="dark"] .status.entregado   { color: #4CDDA8; }
  html[data-theme="dark"] .status.revision    { color: #EF8B68; }

  /* ----- Detail pane ----- */
  .detail-pane { overflow-y:auto; background: var(--paper-2); padding: 24px 28px; min-width: 0; }
  .detail-head { display:flex; justify-content:space-between; align-items:flex-start; gap:24px; flex-wrap: wrap; }
  .detail-head .left { min-width: 0; flex: 1 1 320px; }
  .detail-head .left h1 { font-family:'Sora',sans-serif; font-weight:700; font-size: 30px; letter-spacing:-0.035em; margin: 4px 0 8px; line-height: 1.1; }
  .detail-head .left .sub { color: var(--ink-3); font-size: 13.5px; display:flex; align-items:center; gap:10px; flex-wrap: wrap; }
  .detail-head .actions { display:flex; gap:8px; flex-wrap: wrap; }

  .stat-row { display:grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 28px; }
  .stat { background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; display:flex; flex-direction:column; gap: 6px; }
  .stat .k { font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); font-weight:600; }
  .stat .v { font-size: 26px; line-height: 1; }
  .stat .d { font-size: 12px; color: var(--ink-3); }
  .stat .d.up { color: var(--gain); font-family:'JetBrains Mono',ui-monospace,monospace; font-weight:600; }
  .stat .d.down { color: var(--loss); font-family:'JetBrains Mono',ui-monospace,monospace; font-weight:600; }

  .card {
    background: var(--paper); border: 1px solid var(--line); border-radius: 14px;
    padding: 20px; margin-top: 20px;
  }
  .card-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 16px; }
  .card-head h3 { font-family:'Sora',sans-serif; font-weight:700; font-size: 16px; letter-spacing:-0.02em; margin: 0; }
  .card-head .sub { font-size: 12px; color: var(--ink-3); }

  /* comparables table */
  table.cmp { width:100%; border-collapse: collapse; font-size: 13px; }
  table.cmp th { text-align:left; padding: 8px 8px; font-size: 10.5px; letter-spacing:0.14em; text-transform:uppercase; color: var(--ink-3); font-weight:600; border-bottom: 1px solid var(--line); }
  table.cmp td { padding: 12px 8px; border-bottom: 1px solid var(--line); color: var(--ink-2); }
  table.cmp tr:last-child td { border-bottom: none; }
  table.cmp tr:hover td { background: var(--paper-2); }
  table.cmp td.addr { color: var(--ink); font-weight:500; }
  table.cmp td.right { text-align:right; font-family:'JetBrains Mono',ui-monospace,monospace; }
  .match-bar { width: 60px; height: 6px; background: var(--paper-3); border-radius:99px; display:inline-block; overflow:hidden; }
  .match-bar > div { height: 100%; background: var(--accent); }

  /* ----- Right rail ----- */
  .rail { border-left: 1px solid var(--line); background: var(--paper); padding: 20px; display:flex; flex-direction:column; gap: 18px; overflow-y:auto; }
  .rail h4 { font-family:'Sora',sans-serif; font-weight:700; font-size: 13px; letter-spacing:-0.01em; margin: 0 0 8px; }
  .kv-list { display:flex; flex-direction:column; gap: 10px; }
  .kv { display:flex; justify-content:space-between; align-items:center; font-size: 13px; }
  .kv .k { color: var(--ink-3); }
  .kv .v { color: var(--ink); font-weight: 500; }
  .kv .v.mono { font-family:'JetBrains Mono',ui-monospace,monospace; font-weight: 600; }

  .timeline { display:flex; flex-direction:column; gap: 14px; }
  .tl-item { display:grid; grid-template-columns: 14px 1fr; gap: 12px; position: relative; }
  .tl-dot { width: 10px; height: 10px; border-radius: 99px; background: var(--paper-3); border: 2px solid var(--paper); margin-top: 3px; outline: 1px solid var(--line-2); }
  .tl-dot.accent { background: var(--accent); outline-color: var(--accent); }
  .tl-text { font-size: 13px; color: var(--ink-2); }
  .tl-text strong { color: var(--ink); font-weight: 600; }
  .tl-time { font-size: 11px; color: var(--ink-3); font-family:'JetBrains Mono',ui-monospace,monospace; margin-top: 2px; }
  .tl-line { position: absolute; left: 6px; top: 12px; bottom: -14px; width: 1px; background: var(--line-2); }
  .tl-item:last-child .tl-line { display:none; }

  .contact-card { display:flex; gap: 10px; align-items:center; padding: 12px; border:1px solid var(--line); border-radius: 12px; background: var(--paper-2); }
  .contact-card .av { width: 36px; height: 36px; border-radius:99px; background: linear-gradient(135deg, #4FB6FA, #2A6FDB); }
  .contact-card .name { font-size: 13.5px; font-weight: 600; }
  .contact-card .meta { font-size: 11px; color: var(--ink-3); }

  /* misc */
  .row-flex { display:flex; gap: 10px; align-items:center; }

  /* ===== Generic view containers ===== */
  .view-pane { height: 100%; min-height: 0; overflow-y: auto; background: var(--paper-2); }
  .view-pad { padding: 24px 28px; }

  /* page header (used by most non-Tasaciones views) */
  .page-head {
    display:flex; justify-content:space-between; align-items:flex-end;
    gap: 24px; padding: 22px 28px 18px;
    border-bottom: 1px solid var(--line); background: var(--paper);
  }
  .page-head h1 { font-family:'Sora',sans-serif; font-weight:700; font-size: 30px; letter-spacing:-0.035em; margin: 0 0 4px; }
  .page-head .lede { color: var(--ink-3); font-size: 13.5px; }
  .page-head .actions { display:flex; gap: 8px; align-items:center; }

  /* ===== Bandeja ===== */
  .inbox-shell { display:grid; grid-template-columns: 420px 1fr; min-height: 0; height: 100%; background: var(--paper); }
  .inbox-list { border-right:1px solid var(--line); overflow-y:auto; display:flex; flex-direction:column; }
  .inbox-list .tabs { padding-inline: 16px; }
  .inbox-item {
    display:grid; grid-template-columns: 28px 1fr auto; gap: 10px;
    padding: 14px 18px; border-bottom: 1px solid var(--line); cursor: pointer; position: relative;
    align-items: start;
  }
  .inbox-item.unread::before {
    content:""; position:absolute; left: 8px; top: 22px; width: 6px; height: 6px; border-radius:99px; background: var(--accent);
  }
  .inbox-item.selected { background: var(--paper-2); }
  .inbox-item.selected::after {
    content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background: var(--accent);
  }
  .inbox-item .av { width: 28px; height: 28px; border-radius: 99px; background: linear-gradient(135deg, #4FB6FA, #2A6FDB); flex:0 0 auto; }
  .inbox-item .av.green { background: linear-gradient(135deg, var(--accent), var(--accent-dk)); }
  .inbox-item .av.warn  { background: linear-gradient(135deg, #F5C46B, #D9A93A); }
  .inbox-item .av.loss  { background: linear-gradient(135deg, #E8997B, var(--loss)); }
  .inbox-item .who { font-size: 13.5px; font-weight: 600; }
  .inbox-item .prev { font-size: 13px; color: var(--ink-2); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .inbox-item .when { font-size: 11px; color: var(--ink-3); font-family:'JetBrains Mono',ui-monospace,monospace; }
  .inbox-detail { padding: 28px 32px; overflow-y: auto; background: var(--paper); }

  /* ===== Propiedades table ===== */
  .props-table { width:100%; border-collapse: collapse; font-size: 13px; background: var(--paper); }
  .props-table thead th {
    text-align:left; padding: 12px 14px;
    font-size: 10.5px; letter-spacing:0.14em; text-transform:uppercase; color: var(--ink-3); font-weight:600;
    border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--paper); z-index: 2;
  }
  .props-table tbody td { padding: 14px 14px; border-bottom: 1px solid var(--line); color: var(--ink-2); }
  .props-table tbody tr:hover td { background: var(--paper-2); }
  .props-table td.addr { color: var(--ink); font-weight: 500; }
  .props-table td.right { text-align:right; font-family:'JetBrains Mono',ui-monospace,monospace; }
  .pill-cell { display:inline-flex; padding: 3px 8px; border-radius: 99px; background: var(--paper-3); font-size: 11px; font-weight: 600; color: var(--ink-2); }

  .toolbar {
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 18px; background: var(--paper); border-bottom: 1px solid var(--line);
    gap: 16px; flex-wrap: wrap;
  }
  .toolbar .left, .toolbar .right { display:flex; align-items:center; gap: 8px; flex-wrap: wrap; }
  .seg { display:inline-flex; border: 1px solid var(--line-2); border-radius: 8px; overflow: hidden; }
  .seg .opt { padding: 7px 12px; font-size: 12.5px; color: var(--ink-2); cursor: pointer; }
  .seg .opt.on { background: var(--ink); color: var(--paper); }

  /* ===== Pipeline ===== */
  .kanban {
    display:grid; grid-template-columns: repeat(5, 1fr); gap: 14px;
    padding: 22px 28px; height: 100%; overflow-x: auto;
    background: var(--paper-2);
  }
  .col-k { display:flex; flex-direction:column; gap: 10px; min-width: 240px; }
  .col-k .col-head {
    display:flex; align-items:center; justify-content:space-between;
    padding: 4px 8px 0;
  }
  .col-k .col-head .ct { display:flex; align-items:center; gap: 8px; }
  .col-k .col-head .ct .d { width:8px; height:8px; border-radius: 99px; }
  .col-k .col-head .name { font-family:'Sora',sans-serif; font-weight: 700; font-size: 13.5px; letter-spacing:-0.01em; }
  .col-k .col-head .cnt { font-family:'JetBrains Mono',ui-monospace,monospace; font-size: 11px; color: var(--ink-3); }
  .col-k.solicitado  .d { background: var(--info); }
  .col-k.en-analisis .d { background: var(--warn); }
  .col-k.comparables .d { background: #B97AFB; }
  .col-k.revision    .d { background: var(--loss); }
  .col-k.entregado   .d { background: var(--accent); }

  .k-card {
    background: var(--paper); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; display:flex; flex-direction:column; gap: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .k-card .k-addr { font-size: 13.5px; font-weight: 600; color: var(--ink); }
  .k-card .k-meta { font-size: 11.5px; color: var(--ink-3); display:flex; gap: 8px; }
  .k-card .k-foot { display:flex; align-items:center; justify-content:space-between; margin-top: 4px; }
  .k-card .k-price { font-family:'Sora',sans-serif; font-weight: 700; font-size: 14px; letter-spacing:-0.02em; }
  .k-card .k-days  { font-size: 11px; color: var(--ink-3); font-family:'JetBrains Mono',ui-monospace,monospace; }
  .k-card .k-av    { width: 22px; height: 22px; border-radius: 99px; background: linear-gradient(135deg, var(--accent), var(--accent-dk)); }
  .add-card {
    border: 1px dashed var(--line-2); border-radius: 10px;
    padding: 10px; color: var(--ink-3); font-size: 12.5px; cursor: pointer;
    display:flex; align-items:center; justify-content:center; gap: 6px;
    background: transparent;
  }

  /* ===== Clientes ===== */
  .clients-shell { display:grid; grid-template-columns: 380px 1fr; height: 100%; min-height: 0; background: var(--paper); }
  .client-list { border-right: 1px solid var(--line); overflow-y: auto; }
  .client-row {
    display:flex; align-items:center; gap: 12px;
    padding: 14px 18px; border-bottom: 1px solid var(--line); cursor: pointer; position: relative;
  }
  .client-row:hover { background: var(--paper-2); }
  .client-row.on   { background: var(--paper-2); }
  .client-row.on::before { content:""; position:absolute; left:0; top:0; bottom:0; width: 3px; background: var(--accent); }
  .client-row .logo {
    width: 36px; height: 36px; border-radius: 8px; flex: 0 0 auto;
    display:flex; align-items:center; justify-content:center;
    font-family:'Sora',sans-serif; font-weight: 700; font-size: 13px;
    background: var(--paper-3); color: var(--ink);
  }
  .client-row .name { font-size: 14px; font-weight: 600; }
  .client-row .meta { font-size: 11.5px; color: var(--ink-3); }
  .client-row .val  { margin-left:auto; text-align:right; }
  .client-row .val .v { font-family:'JetBrains Mono',ui-monospace,monospace; font-weight: 600; font-size: 13px; }
  .client-row .val .k { font-size: 10.5px; color: var(--ink-3); }
  .client-detail { padding: 28px 32px; overflow-y: auto; background: var(--paper-2); }

  /* ===== Mercado dashboard ===== */
  .mercado { padding: 24px 28px; display:flex; flex-direction:column; gap: 20px; overflow-y:auto; height:100%; background: var(--paper-2); }
  .mercado .grid-12 { display:grid; grid-template-columns: repeat(12, 1fr); gap: 14px; }
  .mercado .kpi { background: var(--paper); border:1px solid var(--line); border-radius: 12px; padding: 16px 18px; }
  .mercado .kpi .k { font-size: 10.5px; letter-spacing:0.16em; text-transform:uppercase; color: var(--ink-3); font-weight: 600; margin-bottom: 8px; }
  .mercado .kpi .v { font-family:'Sora',sans-serif; font-weight: 700; font-size: 28px; letter-spacing:-0.025em; line-height: 1; }
  .mercado .kpi .d { font-size: 12px; color: var(--ink-3); margin-top: 6px; }
  .mercado .kpi .d.up { color: var(--gain); font-family:'JetBrains Mono',ui-monospace,monospace; font-weight: 600; }
  .mercado .kpi .d.down { color: var(--loss); font-family:'JetBrains Mono',ui-monospace,monospace; font-weight: 600; }
  .panel { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 20px; }
  .panel-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 16px; }
  .panel-head h3 { font-family:'Sora',sans-serif; font-weight: 700; font-size: 16px; letter-spacing:-0.02em; margin:0; }
  .panel-head .sub { font-size: 12px; color: var(--ink-3); }

  .zone-list { display:flex; flex-direction:column; }
  .zone-row {
    display:grid; grid-template-columns: 32px 1fr auto 56px; gap: 12px; align-items: center;
    padding: 10px 4px; border-bottom: 1px solid var(--line); font-size: 13px;
  }
  .zone-row:last-child { border-bottom: none; }
  .zone-row .rk { font-family:'JetBrains Mono',ui-monospace,monospace; color: var(--ink-3); font-weight: 600; font-size: 11.5px; }
  .zone-row .nm { color: var(--ink); font-weight: 500; }
  .zone-row .px { font-family:'JetBrains Mono',ui-monospace,monospace; color: var(--ink); font-weight: 600; }
  .zone-row .ch { text-align:right; font-family:'JetBrains Mono',ui-monospace,monospace; font-size: 12px; font-weight: 600; }
  .zone-row .ch.up { color: var(--gain); }
  .zone-row .ch.dn { color: var(--loss); }

  /* ===== Reportes ===== */
  .reports-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 24px 28px; overflow-y:auto; height: 100%; background: var(--paper-2); }
  .report-card { background: var(--paper); border:1px solid var(--line); border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform .15s ease; display:flex; flex-direction:column; }
  .report-card:hover { transform: translateY(-2px); }
  .report-cover {
    aspect-ratio: 16/9; padding: 22px;
    background: var(--ink); color: var(--paper);
    display:flex; flex-direction:column; justify-content:space-between;
    position: relative; overflow: hidden;
  }
  .report-cover .num { font-family:'JetBrains Mono',ui-monospace,monospace; font-size: 11px; color: rgba(250,251,250,0.55); letter-spacing: 0.16em; }
  .report-cover .title { font-family:'Sora',sans-serif; font-weight: 700; font-size: 22px; line-height: 1.05; letter-spacing:-0.025em; }
  .report-body { padding: 14px 18px 18px; display:flex; flex-direction:column; gap: 6px; }
  .report-body .date { font-size: 11.5px; color: var(--ink-3); letter-spacing: 0.06em; }
  .report-body .stats { display:flex; gap: 16px; margin-top: 8px; }
  .report-body .stats .s { display:flex; flex-direction:column; }
  .report-body .stats .v { font-family:'Sora',sans-serif; font-weight: 700; font-size: 18px; letter-spacing:-0.02em; }
  .report-body .stats .k { font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase; }

  /* ===== Comparables (map view) ===== */
  .comparables-shell { display:grid; grid-template-columns: 1fr 360px; height: 100%; min-height: 0; background: var(--paper); }
  .map-pane { background: var(--paper-2); position: relative; overflow: hidden; }
  .map-rail { border-left: 1px solid var(--line); display:flex; flex-direction:column; min-height: 0; overflow: hidden; }
  .map-rail .header { padding: 16px 18px; border-bottom: 1px solid var(--line); }
  .map-rail .results { overflow-y: auto; }
  .map-rail .res-item {
    padding: 12px 18px; border-bottom: 1px solid var(--line); cursor: pointer;
    display:flex; flex-direction:column; gap: 4px;
  }
  .map-rail .res-item:hover { background: var(--paper-2); }
  .map-rail .res-item .addr { font-size: 13.5px; font-weight: 600; }
  .map-rail .res-item .px { font-family:'JetBrains Mono',ui-monospace,monospace; font-size: 12px; color: var(--ink-2); }

  /* ===== Configuración ===== */
  .config-shell { display:grid; grid-template-columns: 220px 1fr; height: 100%; min-height: 0; background: var(--paper); }
  .config-side { border-right: 1px solid var(--line); padding: 18px 14px; display:flex; flex-direction:column; gap: 2px; }
  .config-side h6 { margin: 12px 8px 8px; font-size: 10.5px; letter-spacing:0.16em; text-transform:uppercase; color: var(--ink-4); font-weight:600; }
  .config-tab { padding: 8px 10px; border-radius: 8px; font-size: 13.5px; color: var(--ink-2); cursor: pointer; }
  .config-tab:hover { background: var(--paper-2); }
  .config-tab.on { background: var(--ink); color: var(--paper); font-weight: 600; }
  .config-main { padding: 28px 36px; overflow-y: auto; background: var(--paper-2); }
  .config-card { background: var(--paper); border:1px solid var(--line); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
  .config-card h3 { font-family:'Sora',sans-serif; font-weight: 700; font-size: 17px; letter-spacing:-0.02em; margin: 0 0 4px; }
  .config-card p.sub { color: var(--ink-3); font-size: 13px; margin: 0 0 18px; }
  .config-field { display:grid; grid-template-columns: 200px 1fr; align-items: center; padding: 12px 0; border-top: 1px solid var(--line); }
  .config-field:first-child { border-top: none; }
  .config-field .ck { font-size: 13px; color: var(--ink-2); font-weight: 500; }
  .config-field .cv input,
  .config-field .cv .fake-input {
    height: 36px; border: 1px solid var(--line-2); border-radius: 8px;
    padding: 0 12px; font-size: 13px; background: var(--paper); color: var(--ink);
    width: 100%; font-family: inherit; box-sizing: border-box;
    display:flex; align-items:center;
  }
  .switch { width: 36px; height: 20px; background: var(--paper-3); border-radius: 99px; position: relative; cursor: pointer; transition: background .15s ease; }
  .switch::after { content:""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 99px; background: var(--paper); box-shadow: 0 1px 2px rgba(0,0,0,0.2); transition: left .15s ease; }
  .switch.on { background: var(--accent); }
  .switch.on::after { left: 18px; }

  /* ===== Estudio (long-scroll editorial reading view) ===== */
  .estudio-shell { height: 100%; overflow-y: auto; background: var(--paper); display:flex; flex-direction:column; }
  .estudio-toolbar {
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 28px; border-bottom: 1px solid var(--line);
    background: var(--paper); position: sticky; top: 0; z-index: 5;

  .estudio-toolbar .left { display:flex; align-items:center; gap: 16px; }

  .estudio-cover h1 .accent { color: var(--accent); }

  .estudio-tldr { display:grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 64px; }
  .tldr-card { background: var(--paper-2); border:1px solid var(--line); border-radius: 12px; padding: 20px; display:flex; flex-direction:column; gap: 10px; }
  .tldr-card .n { font-family:'Sora',sans-serif; font-weight: 700; color: var(--accent); font-size: 32px; letter-spacing: -0.025em; line-height: 1; }
  .tldr-card .h { font-family:'Sora',sans-serif; font-weight:600; font-size: 15px; letter-spacing:-0.015em; }

  .estudio-section { margin-bottom: 72px; }

    font-family:'Sora',sans-serif; font-weight: 700; letter-spacing: -0.035em;

  }
  .estudio-section p strong { color: var(--ink); font-weight: 600; }
  .estudio-figure {
    background: var(--paper-2); border: 1px solid var(--line); border-radius: 14px;
    padding: 24px; margin: 28px 0;
  }
  .estudio-figure figcaption {
    font-size: 12px; color: var(--ink-3); margin-top: 14px;
    font-family:'JetBrains Mono',ui-monospace,monospace; letter-spacing: 0.04em;
  }
  .pull-quote {
    border-left: 3px solid var(--accent);

    font-size: 26px; line-height: 1.25; color: var(--ink);
    max-width: 640px;
  }
  .estudio-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .estudio-table th, .estudio-table td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; }
  .estudio-table th { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }
  .estudio-table td { color: var(--ink-2); }
  .estudio-table td.first { color: var(--ink); font-weight: 500; }
  .estudio-table td.right { text-align: right; font-family:'JetBrains Mono',ui-monospace,monospace; }
  .estudio-table .heat-cell { display:inline-block; width: 60px; height: 22px; border-radius: 4px; }

  .estudio-foot {
    border-top: 1px solid var(--line); padding-top: 32px; margin-top: 80px;
    display:grid; grid-template-columns: 1fr 1fr; gap: 40px;
  }
  .estudio-foot h4 { font-family:'Sora',sans-serif; font-weight: 700; font-size: 13px; letter-spacing:-0.01em; margin: 0 0 10px; }
  .estudio-foot p { font-size: 13px; color: var(--ink-3); line-height: 1.6; margin: 0; }

  /* Pulse for "live" indicators */
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%     { opacity: 0.4; }

  .live { display:inline-flex; align-items:center; gap:6px; font-size: 10.5px; color: var(--ink-3); font-family:'JetBrains Mono',ui-monospace,monospace; }
  .live .ld { width: 6px; height: 6px; border-radius:99px; background: var(--accent); animation: pulse 1.4s ease-in-out infinite; }
</style>
